# Base config for Chest X-ray pneumonia (PRIMARY dataset, binary).
# model.name is filled in per ResNet by scripts/make_configs.py.
# Keep attacks/train identical across the ladder for a fair complexity comparison.
seed: 42

data:
  dataset: "chest_xray_pneumonia"
  data_dir: "./data"
  img_size: 224
  batch_size: 16
  num_workers: 4

model:
  name: "resnet18"
  pretrained: true
  num_classes: null         # auto-set from dataset

train:
  epochs: 20
  lr: 0.0001
  weight_decay: 1.0e-4
  scheduler: "cosine"
  amp: true
  amp_dtype: "float16"
  accumulation_steps: 1
  class_balance:
    loss: "weighted_cross_entropy"   # Chest X-ray is ~26/74 (NORMAL/PNEUMONIA)
    sampler: "none"                  # use loss OR sampler, never both

# --- Core attacks: FGSM + PGD, simplified eps grid (1..16 /255). ---
# The eps=0 clean point is anchored from _meta.clean_accuracy by the figure script.
attacks_main:
  - name: "FGSM"
    eps: [0.003922, 0.007843, 0.015686, 0.031373, 0.062745]   # 1,2,4,8,16 /255
  - name: "PGD"
    eps: [0.003922, 0.007843, 0.015686, 0.031373, 0.062745]
    max_iter: 20
    num_random_init: 1

# --- Fine sub-1/255 eps probe (diagnose where PGD collapses; eval-only). ---
attacks_fine:
  - name: "FGSM"
    eps: [0.000196, 0.000392, 0.000588, 0.000784, 0.000980, 0.001961, 0.003922]  # 0.05,0.1,0.15,0.2,0.25,0.5,1 /255
  - name: "PGD"
    eps: [0.000196, 0.000392, 0.000588, 0.000784, 0.000980, 0.001961, 0.003922]
    max_iter: 20
    num_random_init: 1

# --- Stress-test eps (run separately; NOT mixed into the main curve axis). ---
attacks_stress:
  - name: "FGSM"
    eps: [0.125490, 0.250980]   # 32, 64 /255
  - name: "PGD"
    eps: [0.125490, 0.250980]
    max_iter: 20
    num_random_init: 1

# --- Extended attacks (optional, not core). ---
attacks_extended:
  - name: "AutoPGD"
    eps: [0.015686, 0.031373]
  - name: "SquareAttack"
    eps: [0.015686, 0.031373]
    max_queries: 1000

# --- Attack-method comparison (chest only): four attacks beyond FGSM/PGD,
#     covering distinct paradigms — optimization-based L2 (CW), minimal
#     perturbation (DeepFool), strong ensemble (AutoAttack; binary-safe reduced
#     ensemble APGD-CE+DeepFool+Square, no DLR), gradient-free black-box (Square).
#     CW/DeepFool have NO eps grid: their robust accuracy is not comparable to
#     bounded attacks — report their perturbation block (L2/Linf) alongside. ---
attacks_extra:
  - name: "CW"
    max_iter: 100
    binary_search_steps: 10
    batch_size: 32
  - name: "DeepFool"
    max_iter: 50
    batch_size: 32
  - name: "AutoAttack"
    eps: [0.007843, 0.031373]   # 2, 8 /255
    batch_size: 32
  - name: "SquareAttack"
    eps: [0.007843, 0.031373]
    max_queries: 5000           # standard budget (Andriushchenko et al. 2020)
    batch_size: 32

# --- Adversarial training. Inner PGD is cheap (max_iter 7-10); FORMAL AT must
#     use the full training set (do NOT pass --max-samples for AT training). ---
defenses_main:
  - name: "PGD-AT"
    eps: 0.031373               # 8/255
    eps_step: 0.007843          # 2/255
    max_iter: 7
    nb_epochs: 20
    eps_warmup_epochs: 5        # ramp perturbation budget over first epochs (AT stabiliser)
    lr_warmup_epochs: 3         # ramp LR over first epochs (AT stabiliser)
    batch_size: 16
  - name: "TRADES"              # second method (ablation; run on resnet50 if compute-limited)
    eps: 0.031373
    eps_step: 0.007843
    nb_epochs: 20
    beta: 6.0
    batch_size: 8
    max_iter: 7
  - name: "MART"                # third method (Wang et al. 2020); custom loop shared
    eps: 0.031373               # with PGD-AT -> same warmup stabilisers apply
    eps_step: 0.007843
    max_iter: 7                 # inner PGD matched to PGD-AT for a fair comparison
    nb_epochs: 20
    beta: 6.0                   # official MART default
    eps_warmup_epochs: 5
    lr_warmup_epochs: 3
    batch_size: 8               # clean+adv double forward needs ~2x memory vs PGD-AT
  - name: "PGD-AT-rescue"       # stronger stabilisers to test if a collapsed point
    eps: 0.031373              # is genuinely un-trainable or just under-stabilised.
    eps_step: 0.007843         # Separate results dir/checkpoint suffix (pgd_at_rescue)
    max_iter: 7                # -> does NOT overwrite the original PGD-AT collapse.
    nb_epochs: 30              # more epochs
    eps_warmup_epochs: 8       # longer perturbation-budget ramp
    lr_warmup_epochs: 5        # longer LR ramp
    lr: 5.0e-5                 # halved LR (base 1e-4) for a gentler AT optimisation
    grad_clip: 1.0             # gradient-norm clipping (new stabiliser)
    batch_size: 16

# --- Strong attacks used to EVALUATE the defended model (avoid overestimating). ---
defense_eval:
  pgd_eval:
    max_iter: 50
    num_random_init: 5
    eps: [0.003922, 0.007843, 0.015686, 0.031373, 0.062745]   # 1,2,4,8,16 /255 (matches standard grid)
  autoattack:
    eps: [0.031373]                        # AutoAttack at the headline eps (8/255)
