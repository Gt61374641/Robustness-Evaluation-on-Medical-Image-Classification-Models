# Base config for NIH Malaria Cell Images (SECONDARY dataset, binary, color).
# Patient-level split (handled in src/datasets/malaria.py). model.name filled by make_configs.py.
seed: 42

data:
  dataset: "malaria"
  data_dir: "./data"
  img_size: 224
  batch_size: 32
  num_workers: 4

model:
  name: "resnet152"
  pretrained: true
  num_classes: null

train:
  epochs: 15
  lr: 0.0001
  weight_decay: 1.0e-4
  scheduler: "cosine"
  amp: true
  amp_dtype: "float16"
  accumulation_steps: 1
  class_balance:
    loss: "none"              # Malaria is ~50/50 overall; enable weighting only if a split skews
    sampler: "none"

attacks_main:
  - name: "FGSM"
    eps: [0.003922, 0.007843, 0.015686, 0.031373, 0.062745]
  - name: "PGD"
    eps: [0.003922, 0.007843, 0.015686, 0.031373, 0.062745]
    max_iter: 20
    num_random_init: 1

# --- Fine sub-1/255 eps probe (diagnose where PGD collapses; eval-only). ---
attacks_fine:
  - name: "FGSM"
    eps: [0.000196, 0.000392, 0.000588, 0.000784, 0.000980, 0.001961, 0.003922]  # 0.05,0.1,0.15,0.2,0.25,0.5,1 /255
  - name: "PGD"
    eps: [0.000196, 0.000392, 0.000588, 0.000784, 0.000980, 0.001961, 0.003922]
    max_iter: 20
    num_random_init: 1

attacks_stress:
  - name: "FGSM"
    eps: [0.125490, 0.250980]
  - name: "PGD"
    eps: [0.125490, 0.250980]
    max_iter: 20
    num_random_init: 1

attacks_extended:
  - name: "AutoPGD"
    eps: [0.015686, 0.031373]
  - name: "SquareAttack"
    eps: [0.015686, 0.031373]
    max_queries: 1000

defenses_main:
  - name: "PGD-AT"
    eps: 0.031373
    eps_step: 0.007843
    max_iter: 7
    nb_epochs: 15
    batch_size: 32

defense_eval:
  pgd_eval:
    max_iter: 50
    num_random_init: 5
    eps: [0.003922, 0.007843, 0.015686, 0.031373, 0.062745]   # 1,2,4,8,16 /255
  autoattack:
    eps: [0.031373]
