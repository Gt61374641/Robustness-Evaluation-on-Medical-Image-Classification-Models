# Base config for OCT2017 (SECONDARY dataset, 4-class).
# Standard training + eps-sweep only (no AT, per the plan). model.name filled by make_configs.py.
seed: 42

data:
  dataset: "oct2017"
  data_dir: "./data"
  img_size: 224
  batch_size: 32
  num_workers: 4
  # OCT's ~83k train set is highly redundant; use a fixed stratified 20% (same
  # subset for every model, seed-based) for ~4-5x faster training. Val/test stay
  # full. Set to 1.0 to train on the entire OCT training set.
  train_subsample_frac: 0.2

model:
  name: "resnet34"
  pretrained: true
  num_classes: null

train:
  epochs: 10                  # OCT train set is large (~83k); fine-tuning converges fast
  lr: 0.0001
  weight_decay: 1.0e-4
  scheduler: "cosine"
  amp: true
  amp_dtype: "float16"
  accumulation_steps: 1
  class_balance:
    loss: "weighted_cross_entropy"   # OCT training set is class-imbalanced
    sampler: "none"

attacks_main:
  - name: "FGSM"
    eps: [0.003922, 0.007843, 0.015686, 0.031373, 0.062745]
  - name: "PGD"
    eps: [0.003922, 0.007843, 0.015686, 0.031373, 0.062745]
    max_iter: 20
    num_random_init: 1

# --- Fine sub-1/255 eps probe (diagnose where PGD collapses; eval-only). ---
attacks_fine:
  - name: "FGSM"
    eps: [0.000196, 0.000392, 0.000588, 0.000784, 0.000980, 0.001961, 0.003922]  # 0.05,0.1,0.15,0.2,0.25,0.5,1 /255
  - name: "PGD"
    eps: [0.000196, 0.000392, 0.000588, 0.000784, 0.000980, 0.001961, 0.003922]
    max_iter: 20
    num_random_init: 1

attacks_stress:
  - name: "FGSM"
    eps: [0.125490, 0.250980]
  - name: "PGD"
    eps: [0.125490, 0.250980]
    max_iter: 20
    num_random_init: 1

attacks_extended:
  - name: "AutoPGD"
    eps: [0.015686, 0.031373]
  - name: "SquareAttack"
    eps: [0.015686, 0.031373]
    max_queries: 1000

# AT not run on OCT (secondary). Kept for completeness / optional later use.
defenses_main:
  - name: "PGD-AT"
    eps: 0.031373
    eps_step: 0.007843
    max_iter: 7
    nb_epochs: 20              # harder 4-class task: more AT epochs to converge
    eps_warmup_epochs: 5       # ramp perturbation budget over first epochs (AT stabiliser)
    lr_warmup_epochs: 3        # ramp LR over first epochs (AT stabiliser)
    batch_size: 32
  - name: "TRADES"             # second AT method (cross-dataset ablation, mirrors chest)
    eps: 0.031373
    eps_step: 0.007843
    nb_epochs: 20
    beta: 6.0
    batch_size: 16
    max_iter: 7
  - name: "MART"               # third AT method (Wang et al. 2020); shares custom loop
    eps: 0.031373
    eps_step: 0.007843
    max_iter: 7
    nb_epochs: 20
    beta: 6.0
    eps_warmup_epochs: 5
    lr_warmup_epochs: 3
    batch_size: 16
  - name: "PGD-AT-rescue"      # stronger stabilisers for collapsed points (see chest base)
    eps: 0.031373
    eps_step: 0.007843
    max_iter: 7
    nb_epochs: 30
    eps_warmup_epochs: 8
    lr_warmup_epochs: 5
    lr: 5.0e-5
    grad_clip: 1.0
    batch_size: 32

defense_eval:
  pgd_eval:
    max_iter: 50
    num_random_init: 5
    eps: [0.003922, 0.007843, 0.015686, 0.031373, 0.062745]   # 1,2,4,8,16 /255
  # AutoAttack disabled for OCT: its SquareAttack component (5000 queries) takes
  # ~6-8 h PER model, impractical for a secondary dataset. PGD-50 + 5 restarts is
  # the strong eval we actually compare standard-vs-AT on (and what binary tasks
  # use). Re-enable by restoring an `autoattack:` block if a gold-standard check
  # is needed on a single model.
  # autoattack:
  #   eps: [0.031373]
