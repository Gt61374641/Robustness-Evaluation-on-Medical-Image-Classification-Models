seed: 43

data:
  dataset: "isic2020"
  data_dir: "./data"
  img_size: 224
  batch_size: 16
  num_workers: 4

model:
  name: "densenet121"
  pretrained: true
  num_classes: null

train:
  epochs: 30
  lr: 0.0001
  weight_decay: 1.0e-4
  scheduler: "cosine"
  amp: true
  accumulation_steps: 1
  class_balance:
    loss: "weighted_cross_entropy"
    sampler: "balanced_sampler"

attacks_main:
  - name: "FGSM"
    eps: [0.003921, 0.007843, 0.015686, 0.031372, 0.062745]
  - name: "PGD"
    eps: [0.003921, 0.007843, 0.015686, 0.031372, 0.062745]
    max_iter: 20
  - name: "DeepFool"
    max_iter: 50

attacks_extended:
  - name: "AutoPGD"
    eps: [0.015686, 0.031372]
  - name: "SquareAttack"
    eps: [0.015686, 0.031372]
    max_queries: 1000

defenses_main:
  - name: "PGD-AT"
    eps: 0.031372
    nb_epochs: 30
    batch_size: 16
  - name: "TRADES"
    eps: 0.031372
    nb_epochs: 30
    beta: 6.0
    batch_size: 8
    max_iter: 7

defenses_baseline:
  - name: "SpatialSmoothing"
    window_size: 3
  - name: "JpegCompression"
    quality: 75
  - name: "FeatureSqueezing"
    bit_depth: 4
